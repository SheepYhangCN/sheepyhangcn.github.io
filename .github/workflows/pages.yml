name: Pages

on:
  push:
    branches:
      - master # default branch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          # If your repository depends on submodule, please see: https://github.com/actions/checkout
          submodules: recursive
      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Cache NPM dependencies
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.OS }}-npm-cache
          restore-keys: |
            ${{ runner.OS }}-npm-cache
      - name: Install Dependencies
        run: npm install
      - name: Write commit in footer
        run: |
          COMMIT_SHA=$(git rev-parse HEAD)
          COMMIT_SHA_SHORT=${COMMIT_SHA:0:7}
          COMMIT_URL="https://github.com/SheepYhangCN/sheepyhangcn.github.io/commit/${COMMIT_SHA}"
          sed -i "s|\[Github\](https://github.com/SheepYhangCN/sheepyhangcn.github.io)|[Github](https://github.com/SheepYhangCN/sheepyhangcn.github.io) [(${COMMIT_SHA_SHORT})](${COMMIT_URL})|" _config.stellar.yml
      - name: Build
        run: npm run build
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public
  deploy:
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4